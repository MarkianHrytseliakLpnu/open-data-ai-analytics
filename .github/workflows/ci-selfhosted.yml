name: CI (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run (or 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - loader
          - quality
          - research
          - visualization

env:
  PYTHONPATH: .

jobs:
  # ==========================================
  # 1. CI: Локальне тестування (на вашому ПК)
  # ==========================================
  local-test:
    runs-on: self-hosted
    
    strategy:
      fail-fast: false
      matrix:
        module: [loader, quality, research, visualization]

    env:
      SHOULD_RUN: ${{ github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module }}
    
    steps:
      - name: Manual Checkout (Bulletproof for Windows)
        if: ${{ env.SHOULD_RUN == 'true' }}
        run: |
          if (-not (Test-Path .git)) {
            git clone https://github.com/MarkianHrytseliakLpnu/open-data-ai-analytics.git .
          }
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          
      - name: Check Python version
        if: ${{ env.SHOULD_RUN == 'true' }}
        run: python --version

      - name: Install dependencies
        if: ${{ env.SHOULD_RUN == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest (${{ matrix.module }})
        if: ${{ env.SHOULD_RUN == 'true' }}
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts\${{ matrix.module }}"
          
          echo "Running tests for ${{ matrix.module }}..."
          python -m pytest tests/test_${{ matrix.module }}.py -v > "artifacts\${{ matrix.module }}\test_run.log" 2>&1

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() && env.SHOULD_RUN == 'true' }}
        with:
          name: logs-selfhosted-${{ matrix.module }}
          path: artifacts\${{ matrix.module }}

  # ==========================================
  # 2. CD: Деплой на GitHub Pages (Сервери GitHub)
  # ==========================================
  deploy-pages:
    needs: local-test
    # Виконуємо CD тільки якщо ми в гілці main
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest # <--- Використовуємо хмарний Linux
    
    permissions:
      pages: write
      id-token: write

    steps:
      # Тут безпечно використовувати checkout@v4, бо на Linux папки не блокуються
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Full Pipeline to Generate Figures
        run: python -m src.main

      - name: Generate HTML Report
        run: |
          mkdir -p public
          cp -r reports/figures/* public/
          
          echo "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Open Data AI Analytics</title>" > public/index.html
          echo "<style>body{font-family:sans-serif; text-align:center; background:#f4f4f9;} img{max-width:80%; box-shadow:0 4px 8px rgba(0,0,0,0.1); margin-bottom:40px; border-radius:8px;}</style></head><body>" >> public/index.html
          echo "<h1>Звіт: Аналітика Міжнародної Технічної Допомоги</h1>" >> public/index.html
          
          for file in public/*.png; do
            filename=$(basename "$file")
            echo "<h3>$filename</h3><img src='$filename'><br>" >> public/index.html
          done
          
          echo "</body></html>" >> public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
