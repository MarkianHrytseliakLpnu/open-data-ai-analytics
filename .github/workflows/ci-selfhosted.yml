name: CI (Self-Hosted)

on:
  workflow_dispatch: # Запуск тільки вручну для тестування

jobs:
  local-test:
    runs-on: self-hosted # <--- замість ubuntu-latest
    
    steps:
      # ВИДАЛЯЄМО uses: actions/checkout@v4
      # Замість нього використовуємо звичайні команди Git, 
      # які ніколи не блокують тимчасові папки
      - name: Manual Checkout (Bulletproof for Windows)
        run: |
          # Перевіряємо, чи репозиторій вже існує в папці _work
          if (-not (Test-Path .git)) {
            git clone https://github.com/MarkianHrytseliakLpnu/open-data-ai-analytics.git .
          }
          # Оновлюємо код до найсвіжішої версії
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          
      # Примітка: actions/setup-python часто "вередує" на локальних машинах,
      # тому ми просто використовуємо ваш встановлений локальний Python!
      - name: Check Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest (Quality Module)
        run: |
          # В PowerShell для створення папок краще використовувати New-Item
          New-Item -ItemType Directory -Force -Path artifacts\quality
          python -m pytest tests/test_quality.py -v > artifacts\quality\test_run.log 2>&1
